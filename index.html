<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Landing</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
      line-height:1.6;
    }

    header{
      padding:120px 20px;
      text-align:center;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
    }

    h1{
      font-size:4rem;
      margin-bottom:20px;
    }

    p{
      max-width:700px;
      margin:auto;
      font-size:1.2rem;
    }

    .btn{
      display:inline-block;
      margin-top:30px;
      padding:15px 35px;
      background:white;
      color:#111827;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
    }

    section{
      padding:80px 20px;
      max-width:1200px;
      margin:auto;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:40px;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:20px;
    }

    .card h3{
      margin-bottom:15px;
    }

    footer{
      text-align:center;
      padding:40px;
      border-top:1px solid rgba(255,255,255,.1);
      color:#94a3b8;
    }
  </style>
</head>
<body>

<header>
  <h1>Mi Web Profesional</h1>
  <p>
    Landing page moderna creada directamente desde GitHub Pages.
  </p>

  <a class="btn" href="#">
    Empezar
  </a>
</header>

<section>
  <h2>Características</h2>

  <div class="cards">

    <div class="card">
      <h3>⚡ Rápida</h3>
      <p>Carga instantánea y optimizada.</p>
    </div>

    <div class="card">
      <h3>📱 Responsive</h3>
      <p>Perfecta para móviles y escritorio.</p>
    </div>

    <div class="card">
      <h3>🚀 GitHub Pages</h3>
      <p>Hosting gratuito y fácil de usar.</p>
    </div>

  </div>
</section>

<footer>
  © 2026 Mi Landing
</footer>

</body>
</html>
